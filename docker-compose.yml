version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: miasistente-backend
    ports:
      - "8000:8000"
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: miasistente-frontend
    ports:
      - "3005:3005"
    environment:
      - NEXT_PUBLIC_API_URL
    depends_on:
      - backend
    restart: always
